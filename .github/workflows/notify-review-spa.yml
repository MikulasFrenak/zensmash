name: Notify review-spa

# Lets review-spa's case-study content stay in sync with this repo's facts
# (locale count, test count) without a manual redeploy. See
# review-spa/.github/workflows/sync-and-deploy.yml and
# review-spa/scripts/sync-project-data.mjs for the receiving end.
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch source-updated event to review-spa
        run: |
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.REPO_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/MikulasFrenak/review-spa/dispatches \
            -d '{"event_type":"source-updated"}'
